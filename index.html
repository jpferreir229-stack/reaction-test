<!DOCTYPE html>
<html>
<head>
<title>Reaction Time Test</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

#box{
width:400px;
height:200px;
background:red;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Reaction Time Test</h1>
<p>Clica quando ficar verde</p>

<div id="box">Aguarda...</div>

<p id="result"></p>

<script>

let startTime;

function startGame(){

let delay = Math.random()*3000+2000;

setTimeout(function(){

document.getElementById("box").style.background="green";
document.getElementById("box").innerText="CLICA!";
startTime = Date.now();

},delay);

}

document.getElementById("box").onclick=function(){

if(startTime){

let reaction = Date.now()-startTime;

document.getElementById("result").innerText =
"Tempo de reação: "+reaction+" ms";

startTime=null;

document.getElementById("box").style.background="red";
document.getElementById("box").innerText="Aguarda...";

startGame();

}

}

startGame();

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Reaction Time Test</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
background:#111;
color:white;
}

#game{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
cursor:pointer;
}

.blue{background:#2980b9;}
.red{background:#c0392b;}
.green{background:#27ae60;}

#results{
font-size:22px;
margin-top:20px;
}

canvas{
max-width:800px;
margin:40px auto;
}

</style>
</head>

<body>

<h1>Reaction Time Test</h1>
<p>5 tentativas — espera pelo verde e clica o mais rápido possível</p>

<div id="game" class="blue">
Clique para começar
</div>

<div id="results"></div>

<canvas id="chart"></canvas>

<script>

let startTime;
let waiting=false;

let attempts=0;
let maxAttempts=5;

let scores=[];

const game=document.getElementById("game");
const results=document.getElementById("results");

game.addEventListener("click",function(){

if(game.classList.contains("blue") && attempts==0){

startRound();

}

else if(game.classList.contains("blue") && attempts<maxAttempts){

startRound();

}

else if(game.classList.contains("green")){

let reaction=new Date().getTime()-startTime;

scores.push(reaction);

attempts++;

if(attempts<maxAttempts){

game.className="blue";
game.innerHTML="Tempo: "+reaction+" ms<br>Próxima tentativa ("+(attempts+1)+"/5)";

}
else{

finishGame();

}

}

else if(waiting){

game.className="blue";
game.innerHTML="Muito cedo! Clica para recomeçar";
waiting=false;
attempts=0;
scores=[];

}

});

function startRound(){

game.className="red";
game.innerText="Espera pelo verde...";
waiting=true;

let delay=Math.random()*3000+2000;

setTimeout(()=>{

game.className="green";
game.innerText="CLICA!";
startTime=new Date().getTime();
waiting=false;

},delay);

}

function finishGame(){

let sum=scores.reduce((a,b)=>a+b,0);
let average=Math.round(sum/scores.length);

game.className="blue";
game.innerHTML="Resultado final: "+average+" ms<br>Clica para jogar novamente";

results.innerHTML="Os teus tempos: "+scores.join(" ms, ")+" ms";

createChart(scores,average);

attempts=0;
scores=[];

}

function createChart(userScores,average){

let globalAverage=273;

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Tentativa 1","Tentativa 2","Tentativa 3","Tentativa 4","Tentativa 5","Média Global"],

datasets:[{

label:"Tempo (ms)",

data:[...userScores,globalAverage],

backgroundColor:[
"#3498db",
"#3498db",
"#3498db",
"#3498db",
"#3498db",
"#e74c3c"
]

}]

},

options:{
plugins:{
legend:{display:false}
},
scales:{
y:{
beginAtZero:true
}
}
}

});

}

</script>

</body>
</html>
