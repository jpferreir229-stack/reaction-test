<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>reactions on time - Reaction Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 800px;
    width: 90%;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

h1 {
    font-size: 48px;
    margin: 0 0 10px 0;
    background: linear-gradient(135deg, #fff, #a8e6cf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: lowercase;
}

h1::first-letter {
    text-transform: uppercase;
}

.subtitle {
    color: #aaa;
    margin-bottom: 30px;
    font-size: 18px;
}

#game {
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    cursor: pointer;
    border-radius: 20px;
    margin: 30px 0;
    transition: all 0.2s;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.blue {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.red {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

.green {
    background: linear-gradient(135deg, #00c853, #64dd17);
}

.stats {
    display: flex;
    justify-content: space-around;
    margin: 30px 0;
    gap: 20px;
}

.stat-box {
    flex: 1;
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.stat-label {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 10px;
}

.stat-value {
    font-size: 32px;
    font-weight: bold;
    color: #00f2fe;
}

.history-box {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    padding: 20px;
    margin-top: 30px;
}

.history-box h3 {
    color: #00f2fe;
    margin: 0 0 20px 0;
    font-size: 24px;
}

.history-item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 18px;
}

.history-item:last-child {
    border-bottom: none;
}

.history-item .date {
    color: #aaa;
}

.history-item .score {
    color: #00ff88;
    font-weight: bold;
}

.no-history {
    opacity: 0.7;
    font-style: italic;
    padding: 20px;
}

.lose-message {
    color: #ff6b6b;
    font-size: 28px;
}

.win-message {
    color: #00ff88;
    font-size: 28px;
}

#results {
    font-size: 20px;
    margin: 20px 0;
    min-height: 30px;
}

button {
    background: linear-gradient(135deg, #3a8dff, #00c6ff);
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
    margin: 10px;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
}

.footer {
    margin-top: 20px;
    color: #666;
    font-size: 14px;
}
</style>
</head>

<body>
    <div class="container">
        <h1>reactions on time</h1>
        <div class="subtitle">test your reaction time</div>
        
        <div id="game" class="blue">Click to Start</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Attempt</div>
                <div class="stat-value" id="currentAttempt">1/5</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Last</div>
                <div class="stat-value" id="lastScore">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="bestScore">-</div>
            </div>
        </div>
        
        <div id="results"></div>
        <div id="restartContainer"></div>
        
        <div class="history-box">
            <h3>📋 Your History</h3>
            <div id="historyList"></div>
        </div>
        
        <div class="footer">5 attempts • click on green</div>
    </div>

    <script>
        // Game variables
        let startTime;
        let waiting = false;
        let attempts = 0;
        const maxAttempts = 5;
        let scores = [];
        let gameActive = true;
        let timeoutId = null;
        let gameOver = false;
        
        // History array
        let history = JSON.parse(localStorage.getItem('reaction_history')) || [];
        
        // DOM elements
        const game = document.getElementById("game");
        const results = document.getElementById("results");
        const restartContainer = document.getElementById("restartContainer");
        const currentAttemptSpan = document.getElementById("currentAttempt");
        const lastScoreSpan = document.getElementById("lastScore");
        const bestScoreSpan = document.getElementById("bestScore");
        
        // Initialize
        updateHistoryDisplay();
        updateStats();
        
        // Event listener
        game.addEventListener("click", handleReactionClick);
        
        function handleReactionClick() {
            if (gameOver) return;
            
            // Start game
            if (!gameActive || game.classList.contains("blue")) {
                gameActive = true;
                startRound();
                return;
            }
            
            // Clicked too soon
            if (waiting) {
                loseGame("Too soon! You lost!");
                return;
            }
            
            // Clicked on green
            if (game.classList.contains("green")) {
                let reaction = Date.now() - startTime;
                scores.push(reaction);
                attempts++;
                
                currentAttemptSpan.textContent = (attempts + 1) + "/5";
                
                if (attempts < maxAttempts) {
                    game.className = "blue";
                    game.innerHTML = "✅ " + reaction + " ms<br>Click for next round";
                    gameActive = true;
                    waiting = false;
                } else {
                    finishGame();
                }
            }
        }
        
        function startRound() {
            if (gameOver) return;
            
            game.className = "red";
            game.innerText = "⏳ Wait for green...";
            waiting = true;
            gameActive = true;
            
            if (timeoutId) clearTimeout(timeoutId);
            
            let delay = Math.random() * 3000 + 2000; // 2-5 seconds
            timeoutId = setTimeout(() => {
                if (gameOver) return;
                game.className = "green";
                game.innerText = "⚡ CLICK NOW! ⚡";
                startTime = Date.now();
                waiting = false;
                timeoutId = null;
            }, delay);
        }
        
        function loseGame(message) {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            gameOver = true;
            gameActive = false;
            waiting = false;
            
            game.className = "red";
            game.innerHTML = '<span class="lose-message">❌ ' + message + ' ❌</span>';
            results.innerHTML = "You lost! Try again.";
            restartContainer.innerHTML = '<button onclick="restartGame()">Play Again</button>';
        }
        
        function finishGame() {
            gameActive = false;
            gameOver = false;
            waiting = false;
            
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            let sum = scores.reduce((a, b) => a + b, 0);
            let average = Math.round(sum / scores.length);
            
            // Save to history
            let historyEntry = {
                date: new Date().toLocaleString(),
                average: average,
                attempts: [...scores]
            };
            history.unshift(historyEntry);
            if (history.length > 10) history.pop();
            localStorage.setItem('reaction_history', JSON.stringify(history));
            
            // Update display
            game.className = "blue";
            game.innerHTML = "🏆 Average: " + average + " ms 🏆";
            
            let attemptsText = scores.map((s, i) => `#${i+1}: ${s}ms`).join(" • ");
            results.innerHTML = attemptsText;
            
            restartContainer.innerHTML = '<button onclick="restartGame()">Play Again</button>';
            
            // Update history and stats
            updateHistoryDisplay();
            updateStats();
        }
        
        function restartGame() {
            attempts = 0;
            scores = [];
            gameActive = true;
            waiting = false;
            gameOver = false;
            
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            game.innerHTML = "Click to Start";
            game.className = "blue";
            results.innerHTML = "";
            restartContainer.innerHTML = "";
            currentAttemptSpan.textContent = "1/5";
        }
        
        function updateHistoryDisplay() {
            let historyList = document.getElementById("historyList");
            let html = '';
            
            if (history.length === 0) {
                html = '<div class="no-history">No games yet. Start playing!</div>';
            } else {
                history.forEach((entry, index) => {
                    if (index < 5) { // Show only last 5 games
                        html += `
                            <div class="history-item">
                                <span class="date">${entry.date}</span>
                                <span class="score">${entry.average} ms</span>
                            </div>
                        `;
                    }
                });
            }
            
            historyList.innerHTML = html;
        }
        
        function updateStats() {
            // Update last score
            if (history.length > 0) {
                lastScoreSpan.textContent = history[0].average + " ms";
                
                // Find best score
                let best = Math.min(...history.map(h => h.average));
                bestScoreSpan.textContent = best + " ms";
            } else {
                lastScoreSpan.textContent = "-";
                bestScoreSpan.textContent = "-";
            }
        }
    </script>
</body>
</html>
