<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Reaction Games</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
font-family:'Poppins',sans-serif;
text-align:center;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* TITLES */

h1{
font-size:42px;
margin-top:60px;
font-weight:600;
}

p{
opacity:0.8;
font-size:18px;
}

/* MENU */

#menu{
padding-top:120px;
}

button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#3a8dff,#00c6ff);
color:white;
margin:12px;
transition:0.2s;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

/* GAME CONTAINER */

.gameContainer{
display:none;
padding-top:40px;
}

/* REACTION BOX */

#game{
height:50vh;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
cursor:pointer;
user-select:none;
border-radius:14px;
margin:40px;
transition:0.2s;
}

.blue{
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.red{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.green{
background:linear-gradient(135deg,#00c853,#64dd17);
}

/* COLOR GAME */

#colorGame{
width:320px;
height:320px;
margin:40px auto;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

/* CPS BUTTON */

#cpsButton{
width:320px;
height:320px;
background:linear-gradient(135deg,#36d1dc,#5b86e5);
margin:40px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
border-radius:16px;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
transition:0.2s;
}

#cpsButton:hover{
transform:scale(1.05);
}

/* RESULTS */

#results{
font-size:22px;
margin-top:20px;
}

/* GRAPH */

canvas{
max-width:850px;
margin:50px auto;
background:white;
border-radius:10px;
padding:20px;
}

</style>
</style>
</head>

<body>

<!-- MENU -->

<div id="menu">

<h1>Brain Reaction Games</h1>
<p>Select a game</p>

<button onclick="showGame('reaction')">Reaction Time</button>
<button onclick="showGame('color')">Color Reaction</button>
<button onclick="showGame('cps')">Click Speed Test (CPS)</button>

</div>

<!-- REACTION TIME -->

<div id="reactionGame" class="gameContainer">

<h1>Reaction Time Test</h1>
<p>Wait for green and click as fast as possible. 5 attempts.</p>

<div id="game" class="blue">
Click to Start
</div>

<div id="results"></div>
<div id="restartContainer"></div>

<canvas id="chart"></canvas>

</div>

<!-- COLOR REACTION -->

<div id="colorReactionGame" class="gameContainer">

<h1>Color Reaction Test</h1>
<p>Click ONLY when GREEN appears</p>

<div id="colorGame">Click to Start</div>

<div id="colorResults"></div>

</div>

<!-- CPS -->

<div id="cpsGame" class="gameContainer">

<h1>Click Speed Test</h1>

<p>Click as fast as possible in 5 seconds</p>

<div id="cpsButton">
Click to Start
</div>

<div id="cpsResults"></div>

</div>

<script>

/* MENU */

function showGame(game){

document.getElementById("menu").style.display="none";

document.getElementById("reactionGame").style.display="none";
document.getElementById("colorReactionGame").style.display="none";
document.getElementById("cpsGame").style.display="none";

if(game==="reaction"){
document.getElementById("reactionGame").style.display="block";
}

if(game==="color"){
document.getElementById("colorReactionGame").style.display="block";
}

if(game==="cps"){
document.getElementById("cpsGame").style.display="block";
}

}

/* REACTION TIME */

let startTime;
let waiting=false;
let attempts=0;
const maxAttempts=5;

let scores=[];
let gameActive=false;

const game=document.getElementById("game");
const results=document.getElementById("results");
const restartContainer=document.getElementById("restartContainer");

game.addEventListener("click",handleClick);

function handleClick(){

if(!gameActive){

gameActive=true;
startRound();
return;

}

if(game.classList.contains("green")){

let reaction=Date.now()-startTime;
scores.push(reaction);

attempts++;

if(attempts<maxAttempts){

game.className="blue";
game.innerHTML="Reaction: "+reaction+" ms<br>Click for next round ("+(attempts+1)+"/5)";

}else{

finishGame();

}

}

else if(waiting){

game.className="blue";
game.innerHTML="Too soon! Click to restart";
resetGame();

}

else if(game.classList.contains("blue") && attempts<maxAttempts){

startRound();

}

}

function startRound(){

game.className="red";
game.innerText="Wait for green...";
waiting=true;

let delay=Math.random()*3000+2000;

setTimeout(()=>{

game.className="green";
game.innerText="CLICK!";
startTime=Date.now();
waiting=false;

},delay);

}

function finishGame(){

gameActive=false;

let sum=scores.reduce((a,b)=>a+b,0);
let average=Math.round(sum/scores.length);

game.className="blue";
game.innerHTML="Your average reaction time: "+average+" ms";

results.innerHTML="Attempts: "+scores.join(" ms, ")+" ms";

createChart(scores);

restartContainer.innerHTML=`<button onclick="restartGame()">Restart</button>`;

}

function createChart(userScores){

let globalAverage=273;

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Attempt 1","Attempt 2","Attempt 3","Attempt 4","Attempt 5","Average Human"],
datasets:[{
label:"Reaction Time (ms)",
data:[...userScores,globalAverage]
}]
},

options:{
scales:{y:{beginAtZero:true}}
}

});

}

function restartGame(){

attempts=0;
scores=[];
gameActive=false;

game.innerHTML="Click to Start";
game.className="blue";

results.innerHTML="";
restartContainer.innerHTML="";

}

/* COLOR REACTION */

const colorGame=document.getElementById("colorGame");
const colorResults=document.getElementById("colorResults");

const colors=["red","blue","green","yellow","purple"];

colorGame.addEventListener("click",function(){

let randomColor=colors[Math.floor(Math.random()*colors.length)];

colorGame.style.background=randomColor;

if(randomColor==="green"){

let start=Date.now();

colorGame.onclick=function(){

let reaction=Date.now()-start;

colorResults.innerHTML="Reaction: "+reaction+" ms";

};

}else{

colorGame.onclick=function(){

colorResults.innerHTML="Wrong color! Wait for GREEN";

};

}

});

/* CPS */

let cpsClicks=0;
let cpsStarted=false;
let cpsTime=5;

const cpsButton=document.getElementById("cpsButton");
const cpsResults=document.getElementById("cpsResults");

cpsButton.addEventListener("click",function(){

if(!cpsStarted){

cpsStarted=true;
cpsClicks=0;

cpsButton.innerText="CLICK!";
cpsResults.innerText="Time: 5s";

let timer=setInterval(function(){

cpsTime--;

cpsResults.innerText="Time: "+cpsTime+"s";

if(cpsTime<=0){

clearInterval(timer);

let cps=(cpsClicks/5).toFixed(2);

cpsButton.innerText="Finished";

cpsResults.innerHTML="Total Clicks: "+cpsClicks+"<br>CPS: "+cps;

cpsStarted=false;
cpsTime=5;

}

},1000);

}else{

cpsClicks++;

}

});

</script>

</body>
</html>
