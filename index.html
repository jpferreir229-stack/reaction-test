<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reaction Time Test</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
background:#111;
color:white;
}

h1{
margin-top:30px;
}

#game{
height:55vh;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
cursor:pointer;
user-select:none;
}

.blue{background:#2980b9;}
.red{background:#c0392b;}
.green{background:#27ae60;}

#results{
font-size:22px;
margin-top:20px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3498db;
color:white;
margin-top:20px;
}

canvas{
max-width:900px;
margin:40px auto;
}

</style>
</head>

<body>

<h1>Reaction Time Test</h1>
<p>Wait for green and click as fast as possible. 5 attempts.</p>

<div id="game" class="blue">
Click to Start
</div>

<div id="results"></div>

<div id="restartContainer"></div>

<canvas id="chart"></canvas>

<script>

let startTime;
let waiting=false;
let attempts=0;
const maxAttempts=5;

let scores=[];
let gameActive=false;

const game=document.getElementById("game");
const results=document.getElementById("results");
const restartContainer=document.getElementById("restartContainer");

game.addEventListener("click",handleClick);

function handleClick(){

if(!gameActive){

gameActive=true;
startRound();
return;

}

if(game.classList.contains("green")){

let reaction=Date.now()-startTime;
scores.push(reaction);

attempts++;

if(attempts<maxAttempts){

game.className="blue";
game.innerHTML="Reaction: "+reaction+" ms<br>Click for next round ("+(attempts+1)+"/5)";

}else{

finishGame();

}

}

else if(waiting){

game.className="blue";
game.innerHTML="Too soon! Click to restart";

resetGame();

}

else if(game.classList.contains("blue") && attempts<maxAttempts){

startRound();

}

}

function startRound(){

game.className="red";
game.innerText="Wait for green...";
waiting=true;

let delay=Math.random()*3000+2000;

setTimeout(()=>{

game.className="green";
game.innerText="CLICK!";
startTime=Date.now();
waiting=false;

},delay);

}

function finishGame(){

gameActive=false;

let sum=scores.reduce((a,b)=>a+b,0);
let average=Math.round(sum/scores.length);

game.className="blue";
game.innerHTML="Your average reaction time: "+average+" ms";

results.innerHTML="Your attempts: "+scores.join(" ms, ")+" ms";

createChart(scores);

restartContainer.innerHTML=`<button onclick="restartGame()">Restart</button>`;

}

function createChart(userScores){

let globalAverage=273;

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:[
"Attempt 1",
"Attempt 2",
"Attempt 3",
"Attempt 4",
"Attempt 5",
"Average Human"
],

datasets:[{

label:"Reaction Time (ms)",

data:[...userScores,globalAverage]

}]

},

options:{
scales:{
y:{
beginAtZero:true
}
}
}

});

}

function restartGame(){

resetGame();

game.innerHTML="Click to Start";

results.innerHTML="";
restartContainer.innerHTML="";
document.getElementById("chart").getContext("2d").clearRect(0,0,800,400);

}

function resetGame(){

attempts=0;
scores=[];
gameActive=false;

}

</script>

</body>
</html>
