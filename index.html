<!DOCTYPE html>
<html>
<head>
<title>Reaction Time Test</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

#box{
width:400px;
height:200px;
background:red;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Reaction Time Test</h1>
<p>Clica quando ficar verde</p>

<div id="box">Aguarda...</div>

<p id="result"></p>

<script>

let startTime;

function startGame(){

let delay = Math.random()*3000+2000;

setTimeout(function(){

document.getElementById("box").style.background="green";
document.getElementById("box").innerText="CLICA!";
startTime = Date.now();

},delay);

}

document.getElementById("box").onclick=function(){

if(startTime){

let reaction = Date.now()-startTime;

document.getElementById("result").innerText =
"Tempo de reação: "+reaction+" ms";

startTime=null;

document.getElementById("box").style.background="red";
document.getElementById("box").innerText="Aguarda...";

startGame();

}

}

startGame();

</script>

</body>
</html>
